<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Title Previewer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c10;
    --panel:    #111318;
    --border:   #2a2d38;
    --accent:   #4af0c8;
    --accent2:  #f0a84a;
    --dim:      #3a3d4a;
    --text:     #c8ccd8;
    --text-dim: #5a5e72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .logo-mark {
    width: 32px; height: 32px;
    border: 2px solid var(--accent); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--accent); text-shadow: 0 0 8px var(--accent); flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; }
  header h1 span { color: var(--accent); }
  .header-back {
    margin-left: auto;
    font-size: 12px; font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim); letter-spacing: 1px;
    text-decoration: none;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 12px;
    transition: all .15s;
  }
  .header-back:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Layout ── */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr auto;
  }

  /* ── Panels ── */
  .panel {
    padding: 20px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 14px;
    overflow-y: auto;
  }
  .panel.preview-panel { border-right: none; background: #0d0f14; }

  .panel-label {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .panel-label::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent);
  }

  /* ── Controls grid ── */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    flex-shrink: 0;
  }
  .control-group { display: flex; flex-direction: column; gap: 5px; }
  .control-group label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
  }

  select {
    background: #0d0f14; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 13px;
    padding: 7px 10px; outline: none; cursor: pointer;
    transition: border-color .2s;
  }
  select:focus { border-color: var(--accent); }

  input[type="color"] {
    width: 100%; height: 34px;
    border: 1px solid var(--border); border-radius: 4px;
    background: #0d0f14; cursor: pointer; padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border-radius: 2px; border: none; }

  input[type="file"] {
    background: #0d0f14; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace; font-size: 11px;
    padding: 6px 8px; cursor: pointer; width: 100%;
  }
  input[type="file"]::file-selector-button {
    background: var(--panel); border: 1px solid var(--dim); border-radius: 3px;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 12px;
    padding: 3px 8px; cursor: pointer; margin-right: 8px;
  }

  /* Range slider */
  .size-control { display: flex; align-items: center; gap: 10px; }
  .size-control input[type="range"] { flex: 1; }
  input[type=range] {
    -webkit-appearance: none; height: 6px; border-radius: 3px;
    background: var(--dim); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    box-shadow: 0 0 5px rgba(74,240,200,.4); cursor: pointer;
  }
  .size-value {
    min-width: 40px; text-align: right;
    font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--accent);
  }

  /* ── Textarea ── */
  .editor-area { flex: 1; min-height: 120px; }
  textarea {
    width: 100%; height: 100%; min-height: 120px;
    background: #0d0f14; border: 1px solid var(--border); border-radius: 6px;
    color: #c8ccd8; font-family: 'Share Tech Mono', monospace;
    font-size: 13px; line-height: 1.7; padding: 14px;
    resize: none; outline: none; transition: border-color .2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--dim); }

  /* ── How-to note ── */
  .howto {
    background: rgba(74,240,200,.04);
    border: 1px solid rgba(74,240,200,.12);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
    flex-shrink: 0;
  }
  .howto strong { color: var(--accent); }

  /* ── Preview ── */
  .preview-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background:
      repeating-linear-gradient(0deg,   transparent, transparent 30px, rgba(255,255,255,.02) 30px, rgba(255,255,255,.02) 31px),
      repeating-linear-gradient(90deg,  transparent, transparent 30px, rgba(255,255,255,.02) 30px, rgba(255,255,255,.02) 31px);
    border: 1px solid var(--border); border-radius: 6px;
    min-height: 160px; padding: 30px; position: relative;
    overflow: auto;
  }
  .stage-label {
    position: absolute; top: 8px; left: 12px;
    font-size: 10px; color: var(--text-dim); letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace; pointer-events: none;
  }
  .preview-inner {
    font-weight: bold;
    letter-spacing: 1px;
    line-height: 1.4;
    word-break: break-word;
    white-space: pre-wrap;
    transition: background .2s;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px;
    background: var(--panel); border-top: 1px solid var(--border);
  }
  .status {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--text-dim); letter-spacing: 1px;
  }
  .status span { color: var(--accent); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  @media (max-width: 720px) {
    .workspace { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--border); }
    .controls { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">TP</div>
  <h1>Title <span>Previewer</span></h1>
  <a class="header-back" href="index.html">← Hub</a>
</header>

<div class="workspace">

  <!-- ── LEFT: Controls + Input ── -->
  <div class="panel">
    <div class="panel-label">Settings</div>

    <div class="controls">
      <div class="control-group">
        <label>Background</label>
        <select id="bgColor">
          <option value="000000">Black</option>
          <option value="1a1a2e">Dark Blue</option>
          <option value="0d1117">GitHub Dark</option>
          <option value="FFFFFF">White</option>
          <option value="808080">Gray</option>
          <option value="custom">Custom…</option>
        </select>
      </div>

      <div class="control-group" id="customColorGroup" style="display:none">
        <label>Custom BG</label>
        <input type="color" id="customColor" value="#000000">
      </div>

      <div class="control-group">
        <label>Font Family</label>
        <select id="fontFamily">
          <option value="'Malgun Gothic Semilight','Malgun Gothic',monospace">Malgun Gothic</option>
          <option value="Consolas,monospace">Consolas</option>
          <option value="Arial">Arial</option>
          <option value="'Courier New',monospace">Courier New</option>
          <option value="Georgia,serif">Georgia</option>
          <option value="Verdana">Verdana</option>
        </select>
      </div>

      <div class="control-group">
        <label>Font Size</label>
        <div class="size-control">
          <input type="range" id="fontSize" min="8" max="80" value="32">
          <span class="size-value" id="sizeValue">32px</span>
        </div>
      </div>

      <div class="control-group">
        <label>Load from File</label>
        <input type="file" id="fileInput" accept=".txt,.text">
      </div>
    </div>

    <div class="panel-label">Text Input</div>

    <div class="editor-area">
      <textarea id="textInput" placeholder="^FF0000R^00FF00G^0000FFB&#10;&#10;Each ^RRGGBB colours the single character that follows it."></textarea>
    </div>

    <div class="howto">
      <strong>Format:</strong> ^RRGGBBCHAR &nbsp;·&nbsp; Each colour code colours the one character after it.<br>
      <strong>Example:</strong> ^FF0000R^00FF00G^0000FFB → <strong style="color:#f00">R</strong><strong style="color:#0f0">G</strong><strong style="color:#44f">B</strong>
    </div>
  </div>

  <!-- ── RIGHT: Preview ── -->
  <div class="panel preview-panel">
    <div class="panel-label">Live Preview</div>
    <div class="preview-stage">
      <span class="stage-label">PREVIEW · IN-GAME SIMULATION</span>
      <div class="preview-inner" id="previewText"></div>
    </div>
  </div>

  <!-- ── Bottom ── -->
  <div class="bottom-bar">
    <div class="status">CHARS COLOURED: <span id="charCount">0</span></div>
  </div>
</div>

<script>
  const textInput   = document.getElementById('textInput');
  const previewText = document.getElementById('previewText');
  const bgColorSel  = document.getElementById('bgColor');
  const customColor = document.getElementById('customColor');
  const fontSizeSel = document.getElementById('fontSize');
  const sizeValue   = document.getElementById('sizeValue');
  const fontFamily  = document.getElementById('fontFamily');
  const charCount   = document.getElementById('charCount');
  const stage       = document.querySelector('.preview-stage');

  // Show/hide custom colour picker
  bgColorSel.addEventListener('change', function() {
    document.getElementById('customColorGroup').style.display =
      this.value === 'custom' ? 'flex' : 'none';
    visualize();
  });

  fontSizeSel.addEventListener('input', function() {
    sizeValue.textContent = this.value + 'px';
    visualize();
  });

  [bgColorSel, customColor, fontFamily, textInput].forEach(el =>
    el.addEventListener('change', visualize));
  textInput.addEventListener('input', visualize);

  function isValidHex(s) {
    return s.length === 6 && /^[0-9a-fA-F]{6}$/.test(s);
  }

  function visualize() {
    const input = textInput.value;
    previewText.innerHTML = '';

    let pos = 0, coloured = 0;

    while (pos < input.length) {
      const ch = input[pos];

      if (ch === '\n') {
        previewText.appendChild(document.createElement('br'));
        pos++; continue;
      }

      if (ch === ' ') {
        const s = document.createElement('span');
        s.textContent = ' ';
        previewText.appendChild(s);
        pos++; continue;
      }

      // ^RRGGBB + character
      if (ch === '^' && pos + 7 <= input.length) {
        const hex = input.substring(pos + 1, pos + 7);
        if (isValidHex(hex)) {
          const target = input[pos + 7];
          if (target !== undefined) {
            const s = document.createElement('span');
            s.textContent = target;
            s.style.color = '#' + hex;
            previewText.appendChild(s);
            pos += 8; coloured++; continue;
          }
        }
      }

      // Plain character
      const s = document.createElement('span');
      s.textContent = ch;
      previewText.appendChild(s);
      pos++;
    }

    if (!input.length) {
      previewText.innerHTML = '<span style="color:var(--text-dim)">Preview will appear here…</span>';
    }

    charCount.textContent = coloured;

    // BG colour
    let bg = bgColorSel.value;
    if (bg === 'custom') bg = customColor.value.replace('#','');
    previewText.style.backgroundColor = '#' + bg;
    previewText.style.fontSize  = fontSizeSel.value + 'px';
    previewText.style.fontFamily = fontFamily.value;

    // Auto text colour for uncoloured chars
    const r = parseInt(bg.substring(0,2),16);
    const g = parseInt(bg.substring(2,4),16);
    const b = parseInt(bg.substring(4,6),16);
    const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
    previewText.style.color = lum < 0.5 ? '#ffffff' : '#000000';
  }

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { textInput.value = ev.target.result; visualize(); };
    reader.readAsText(file);
  });

  // Boot
  textInput.value = '^a8d6ffP^b6c8ffe^c5b9ffr^d3aafff^d6b9ffe^dac9ffc^ddd8fft^dfccfei^e0c0fdo^e2b4fcn^e3a8fbi^d0c0fcs^bcd7fft';
  visualize();
</script>
</body>
</html>
