<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Title Color Fader</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c10;
    --panel:    #111318;
    --border:   #2a2d38;
    --accent:   #4af0c8;
    --accent2:  #f0a84a;
    --dim:      #3a3d4a;
    --text:     #c8ccd8;
    --text-dim: #5a5e72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .logo-mark {
    width: 32px; height: 32px;
    border: 2px solid var(--accent); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--accent); text-shadow: 0 0 8px var(--accent); flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; }
  header h1 span { color: var(--accent); }
  .header-back {
    margin-left: auto;
    font-size: 12px; font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim); letter-spacing: 1px;
    text-decoration: none;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 12px; transition: all .15s;
  }
  .header-back:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Page body ── */
  .page { flex: 1; display: flex; flex-direction: column; gap: 0; }

  /* ── Section ── */
  .section {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .section-title::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent);
  }

  /* ── Text input row ── */
  .input-row {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .text-field-wrap { flex: 1; }
  .text-field-wrap label {
    display: block; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace; margin-bottom: 6px;
  }
  input[type="text"] {
    width: 100%; background: #0d0f14; border: 1px solid var(--border);
    border-radius: 5px; color: #fff; font-family: 'Share Tech Mono', monospace;
    font-size: 15px; padding: 10px 14px; outline: none; transition: border-color .2s;
    letter-spacing: 1px;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  /* ── Options row ── */
  .options-row {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-top: 12px;
  }
  .opt-group { display: flex; flex-direction: column; gap: 5px; }
  .opt-group label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
  }
  select {
    background: #0d0f14; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 13px;
    padding: 7px 10px; outline: none; cursor: pointer; transition: border-color .2s;
  }
  select:focus { border-color: var(--accent); }

  /* Toggle: include spaces */
  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle {
    position: relative; width: 38px; height: 20px; cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; background: var(--dim); border-radius: 10px;
    transition: background .2s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    transition: transform .2s;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }
  .toggle-label { font-size: 12px; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; }

  /* ── Gradient stops ── */
  .stops-area {
    display: flex; gap: 0; align-items: stretch;
    background: #0d0f14; border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden;
    margin-top: 4px;
  }
  .stops-list {
    display: flex; flex-wrap: wrap; gap: 10px;
    flex: 1; padding: 14px;
    align-items: center;
  }
  .stop-item {
    display: flex; align-items: center; gap: 6px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 8px;
    cursor: grab;
  }
  .stop-item:active { cursor: grabbing; }
  .stop-color-preview {
    width: 20px; height: 20px; border-radius: 3px; border: 1px solid rgba(255,255,255,.1);
    flex-shrink: 0;
  }
  .stop-hex {
    font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text);
    letter-spacing: 1px;
  }
  .stop-remove {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0 2px;
    transition: color .15s;
  }
  .stop-remove:hover { color: #e74c3c; }

  .stops-add-wrap {
    display: flex; flex-direction: column; gap: 0;
    border-left: 1px solid var(--border); flex-shrink: 0;
  }
  .stops-add-wrap input[type="color"] {
    width: 48px; flex: 1; border: none; border-bottom: 1px solid var(--border);
    border-radius: 0; background: #0d0f14; cursor: pointer; padding: 4px;
  }
  .stops-add-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .stops-add-wrap input[type="color"]::-webkit-color-swatch { border: none; border-radius: 0; }
  .add-stop-btn {
    background: rgba(74,240,200,.08); border: none; color: var(--accent);
    font-size: 18px; cursor: pointer; padding: 8px 14px;
    font-family: 'Share Tech Mono', monospace;
    transition: background .15s;
    flex-shrink: 0;
  }
  .add-stop-btn:hover { background: rgba(74,240,200,.18); }

  /* ── Preset themes ── */
  .themes-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .theme-btn {
    border: 1px solid var(--border); border-radius: 5px;
    background: var(--panel); cursor: pointer;
    padding: 0; overflow: hidden;
    transition: transform .15s, border-color .2s, box-shadow .2s;
    display: flex; flex-direction: column;
    min-width: 90px;
  }
  .theme-btn:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,.3);
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(74,240,200,.2); }
  .theme-bar {
    height: 6px; width: 100%;
  }
  .theme-name {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-dim); padding: 5px 8px 6px;
    text-align: center;
  }
  .theme-btn.active .theme-name { color: var(--accent); }

  /* ── Preview area ── */
  .preview-wrap {
    background: #000;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    min-height: 80px;
    display: flex; align-items: center;
    position: relative;
    overflow: hidden;
  }
  .preview-text-out {
    font-family: 'Malgun Gothic Semilight','Malgun Gothic','Consolas',monospace;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
    word-break: break-all;
    white-space: pre-wrap;
    line-height: 1.3;
  }
  .preview-empty {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--text-dim); letter-spacing: 2px;
  }
  .preview-size-row {
    position: absolute; top: 8px; right: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .preview-size-row input[type="range"] {
    -webkit-appearance: none; width: 80px; height: 5px;
    border-radius: 3px; background: var(--dim); outline: none; cursor: pointer;
  }
  .preview-size-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent); cursor: pointer;
  }
  .preview-size-label {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim);
    min-width: 28px;
  }

  /* ── Raw output ── */
  .raw-section { padding: 16px 24px; background: var(--panel); border-top: 1px solid var(--border); }
  .raw-row { display: flex; gap: 10px; align-items: center; }
  .raw-box {
    flex: 1; background: #0d0f14; border: 1px solid var(--border);
    border-radius: 4px; padding: 9px 14px;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--accent2); overflow-x: auto; white-space: pre;
    letter-spacing: .5px; cursor: pointer; user-select: all;
    min-height: 38px;
  }
  .btn {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 1px; cursor: pointer; border-radius: 4px;
    border: 1px solid var(--dim); background: var(--panel);
    color: var(--text); padding: 7px 14px; transition: all .15s; text-transform: uppercase;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px rgba(74,240,200,.15); }
  .btn-accent { background: rgba(74,240,200,.08); border-color: var(--accent); color: var(--accent); }
  .btn-accent:hover { background: rgba(74,240,200,.2); }
  .copy-status {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--accent); opacity: 0; transition: opacity .3s; white-space: nowrap;
  }
  .copy-status.show { opacity: 1; }

  /* ── Footer ── */
  footer {
    text-align: center; padding: 14px;
    border-top: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--text-dim); letter-spacing: 2px;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  @media (max-width: 640px) {
    .input-row { flex-direction: column; }
    .options-row { gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">CF</div>
  <h1>Title Color <span>Fader</span></h1>
  <a class="header-back" href="index.html">← Hub</a>
</header>

<div class="page">

  <!-- ── 1. Text Input ── -->
  <div class="section">
    <div class="section-title">Your Text</div>
    <div class="input-row">
      <div class="text-field-wrap">
        <label>Enter title text (spaces are handled based on option below)</label>
        <input type="text" id="titleInput" value="Dragon Heart" placeholder="Type your title here…" autocomplete="off">
      </div>
    </div>
    <div class="options-row">
      <div class="opt-group">
        <label>Gradient Direction</label>
        <select id="gradDir">
          <option value="ltr">Left → Right</option>
          <option value="rtl">Right → Left</option>
          <option value="mirror">Mirror (center out)</option>
          <option value="bounce">Bounce (wave)</option>
        </select>
      </div>
      <div class="opt-group">
        <label>Colour Spaces</label>
        <label class="toggle" title="Colour space characters too">
          <input type="checkbox" id="colourSpaces">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="toggle-label" style="font-size:11px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;">colour spaces</span>
      </div>
      <div class="opt-group">
        <label>Repeat Cycle</label>
        <select id="repeatCycle">
          <option value="1">× 1 (full stretch)</option>
          <option value="2">× 2 (cycle twice)</option>
          <option value="3">× 3 (cycle thrice)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── 2. Gradient Stops ── -->
  <div class="section">
    <div class="section-title">Gradient Stops &nbsp;<span style="color:var(--text-dim);font-size:10px;letter-spacing:1px">drag to reorder · click + to add</span></div>
    <div class="stops-area">
      <div class="stops-list" id="stopsList"></div>
      <div class="stops-add-wrap">
        <input type="color" id="newStopColor" value="#ff00ff">
        <button class="add-stop-btn" id="addStopBtn" title="Add stop">+</button>
      </div>
    </div>
  </div>

  <!-- ── 3. Preset Themes ── -->
  <div class="section">
    <div class="section-title">Preset Themes</div>
    <div class="themes-grid" id="themesGrid"></div>
  </div>

  <!-- ── 4. Preview ── -->
  <div class="section">
    <div class="section-title">Live Preview</div>
    <div class="preview-wrap" id="previewWrap">
      <div class="preview-size-row">
        <input type="range" id="previewSize" min="14" max="64" value="28">
        <span class="preview-size-label" id="previewSizeVal">28px</span>
      </div>
      <div class="preview-text-out" id="previewOut"></div>
    </div>
  </div>

</div>

<!-- ── Raw Output ── -->
<div class="raw-section">
  <div class="raw-row">
    <div class="raw-box" id="rawBox">&nbsp;</div>
    <button class="btn btn-accent" id="copyBtn">Copy</button>
    <span class="copy-status" id="copyStatus">✓ Copied!</span>
  </div>
</div>

<footer>title color fader · ^RRGGBB format · dev hub</footer>

<script>
// ═══════════════════════════════════════════════
//  THEMES
// ═══════════════════════════════════════════════
const THEMES = [
  { name: 'Rainbow',   stops: ['ff0000','ff7700','ffff00','00ff00','0099ff','9900ff'] },
  { name: 'Fire',      stops: ['fff000','ffaa00','ff6600','ff2200','cc0000'] },
  { name: 'Ice',       stops: ['ffffff','aaf0ff','44ccff','0088dd','004488'] },
  { name: 'Ocean',     stops: ['00ffcc','00ccff','0088ff','0044cc','001888'] },
  { name: 'Sunset',    stops: ['ff6ec7','ff4488','ff8800','ffcc00','ffffaa'] },
  { name: 'Forest',    stops: ['00ff44','44ff88','88ff00','ccff00','ffff44'] },
  { name: 'Gold',      stops: ['fffacd','ffd700','ffb300','ff8c00','ffd700'] },
  { name: 'Lava',      stops: ['ff0000','ff4400','ffaa00','ff4400','ff0000'] },
  { name: 'Neon',      stops: ['ff00ff','ff0088','ff0000','ff8800','ffff00'] },
  { name: 'Toxic',     stops: ['00ff00','44ff00','aaff00','ffff00','ccff44'] },
  { name: 'Royal',     stops: ['aa00ff','8800ff','5500ff','0044ff','0088ff'] },
  { name: 'Rose',      stops: ['ff99cc','ff66aa','ff3388','ff0066','cc0044'] },
  { name: 'Arctic',    stops: ['ffffff','ccffff','88eeff','44aaff','0066ff'] },
  { name: 'Copper',    stops: ['ffccaa','ff9966','cc6633','994411','cc6633'] },
  { name: 'Acid',      stops: ['ccff00','88ff00','44ff88','00ffcc','00ff44'] },
  { name: 'Twilight',  stops: ['1a0033','6600cc','cc00ff','ff66ff','ffccff'] },
  { name: 'Blood',     stops: ['330000','660000','cc0000','ff0000','ff4444'] },
  { name: 'Sky',       stops: ['001133','0033aa','0088ff','44ccff','aaeeff'] },
  { name: 'Candy',     stops: ['ff88cc','ff44aa','aa00ff','4400ff','0088ff'] },
  { name: 'Sand',      stops: ['fff8dc','f5deb3','daa520','cd853f','8b4513'] },
  { name: 'Aurora',    stops: ['00ff88','00ffcc','00ccff','0088ff','8800ff'] },
  { name: 'Infrared',  stops: ['ff0000','ff4400','ff8800','ffcc00','ffff00'] },
  { name: 'Galaxy',    stops: ['0a0020','4400aa','8800ff','cc44ff','ffaaff'] },
  { name: 'Poison',    stops: ['44ff00','88ff44','ccff00','ffff00','ffcc00'] },
  { name: 'Ghost',     stops: ['ccccff','aaaaff','ffffff','ccccff','8888ff'] },
  { name: 'Crimson',   stops: ['220000','880000','dd0000','ff5555','ffffff'] },
  { name: 'Chrome',    stops: ['888888','cccccc','ffffff','cccccc','888888'] },
  { name: 'Venom',     stops: ['004400','008800','00cc00','44ff00','aaff44'] },
  { name: 'Heatwave',  stops: ['ffff00','ffcc00','ff8800','ff4400','ff0000'] },
  { name: 'Starlight', stops: ['ffffff','ccddff','8899ff','4455ff','ffffff'] },
];

// Current gradient stops state
let stops = [...THEMES[0].stops];

// ═══════════════════════════════════════════════
//  RENDER STOPS LIST
// ═══════════════════════════════════════════════
function renderStops() {
  const list = document.getElementById('stopsList');
  list.innerHTML = '';
  stops.forEach((hex, i) => {
    const item = document.createElement('div');
    item.className = 'stop-item';
    item.draggable = true;
    item.dataset.idx = i;
    item.innerHTML = `
      <div class="stop-color-preview" style="background:#${hex}"></div>
      <span class="stop-hex">#${hex.toUpperCase()}</span>
      ${stops.length > 2 ? `<button class="stop-remove" data-idx="${i}" title="Remove">×</button>` : ''}
    `;
    list.appendChild(item);
  });

  // Drag to reorder
  let dragIdx = null;
  list.querySelectorAll('.stop-item').forEach(el => {
    el.addEventListener('dragstart', e => { dragIdx = +el.dataset.idx; e.dataTransfer.effectAllowed = 'move'; });
    el.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    el.addEventListener('drop',      e => {
      e.preventDefault();
      const to = +el.dataset.idx;
      if (dragIdx !== null && dragIdx !== to) {
        const tmp = stops[dragIdx]; stops[dragIdx] = stops[to]; stops[to] = tmp;
        renderStops(); generate();
      }
    });
  });

  list.querySelectorAll('.stop-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      stops.splice(+btn.dataset.idx, 1);
      renderStops(); generate();
    });
  });
}

document.getElementById('addStopBtn').addEventListener('click', () => {
  const hex = document.getElementById('newStopColor').value.replace('#','');
  stops.push(hex);
  renderStops(); generate();
});

// ═══════════════════════════════════════════════
//  RENDER THEMES
// ═══════════════════════════════════════════════
function renderThemes() {
  const grid = document.getElementById('themesGrid');
  THEMES.forEach((theme, i) => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn';
    btn.dataset.idx = i;
    const gradient = `linear-gradient(90deg, ${theme.stops.map(h => '#'+h).join(',')})`;
    btn.innerHTML = `
      <div class="theme-bar" style="background:${gradient}"></div>
      <div class="theme-name">${theme.name}</div>
    `;
    btn.addEventListener('click', () => {
      stops = [...theme.stops];
      renderStops(); generate();
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    grid.appendChild(btn);
  });
  // Activate first
  grid.querySelector('.theme-btn').classList.add('active');
}

// ═══════════════════════════════════════════════
//  GRADIENT MATH
// ═══════════════════════════════════════════════
function hexToRgb(hex) {
  return [
    parseInt(hex.slice(0,2),16),
    parseInt(hex.slice(2,4),16),
    parseInt(hex.slice(4,6),16),
  ];
}
function rgbToHex(r,g,b) {
  return ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

// Sample the multi-stop gradient at position t ∈ [0,1]
function sampleGradient(t) {
  if (stops.length === 1) return stops[0];
  const scaled = t * (stops.length - 1);
  const lo = Math.floor(scaled);
  const hi = Math.min(lo + 1, stops.length - 1);
  const frac = scaled - lo;
  const [r1,g1,b1] = hexToRgb(stops[lo]);
  const [r2,g2,b2] = hexToRgb(stops[hi]);
  return rgbToHex(
    Math.round(r1 + (r2-r1)*frac),
    Math.round(g1 + (g2-g1)*frac),
    Math.round(b1 + (b2-b1)*frac),
  );
}

// Map character index to gradient t based on direction
function getT(i, total, dir, cycles) {
  let t = total > 1 ? i / (total - 1) : 0;
  t = (t * cycles) % 1;
  if (dir === 'rtl')    return 1 - t;
  if (dir === 'mirror') { const u = t * 2; return u > 1 ? 2 - u : u; }
  if (dir === 'bounce') { const u = (t * 2) % 1; return t * 2 < 1 ? u : 1 - u; }
  return t;
}

// ═══════════════════════════════════════════════
//  GENERATE
// ═══════════════════════════════════════════════
function generate() {
  const raw   = document.getElementById('titleInput').value;
  const dir   = document.getElementById('gradDir').value;
  const doSpaces = document.getElementById('colourSpaces').checked;
  const cycles = +document.getElementById('repeatCycle').value;

  if (!raw) {
    document.getElementById('previewOut').innerHTML = '<span class="preview-empty">Type something above…</span>';
    document.getElementById('rawBox').textContent = ' ';
    return;
  }

  // Count colourable characters
  const chars = raw.split('');
  const colourable = doSpaces ? chars.length : chars.filter(c => c !== ' ').length;

  let colIdx = 0;
  let rawCode = '';
  const previewEl = document.getElementById('previewOut');
  previewEl.innerHTML = '';

  chars.forEach(ch => {
    if (ch === '\n') {
      previewEl.appendChild(document.createElement('br'));
      rawCode += '\\r';
      return;
    }
    if (ch === ' ' && !doSpaces) {
      const s = document.createElement('span');
      s.textContent = ' ';
      previewEl.appendChild(s);
      rawCode += ' ';
      return;
    }
    const t   = getT(colIdx, colourable, dir, cycles);
    const hex = sampleGradient(t);
    colIdx++;

    const s = document.createElement('span');
    s.textContent = ch;
    s.style.color = '#' + hex;
    previewEl.appendChild(s);

    rawCode += '^' + hex + ch;
  });

  document.getElementById('rawBox').textContent = rawCode;
}

// ── Preview font size ─────────────────────────
document.getElementById('previewSize').addEventListener('input', function() {
  document.getElementById('previewOut').style.fontSize = this.value + 'px';
  document.getElementById('previewSizeVal').textContent = this.value + 'px';
});

// ── Events ────────────────────────────────────
['titleInput','gradDir','repeatCycle'].forEach(id =>
  document.getElementById(id).addEventListener('input', generate));
document.getElementById('colourSpaces').addEventListener('change', generate);

// ── Copy ──────────────────────────────────────
function doCopy() {
  const text = document.getElementById('rawBox').textContent.trim();
  if (!text) return;
  const fn = () => {
    copyStatus.classList.add('show');
    setTimeout(() => copyStatus.classList.remove('show'), 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(fn).catch(() => fallback(text, fn));
  } else { fallback(text, fn); }
}
function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta); cb();
}
const copyStatus = document.getElementById('copyStatus');
document.getElementById('copyBtn').addEventListener('click', doCopy);
document.getElementById('rawBox').addEventListener('click', doCopy);

// ── Boot ──────────────────────────────────────
renderStops();
renderThemes();
generate();
</script>
</body>
</html>
